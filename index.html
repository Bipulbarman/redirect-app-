<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Website</title>

<!-- Open Graph -->
<meta property="og:title" content="My Website">
<meta property="og:description" content="Welcome to my website.">
<meta property="og:image" content="ogimage.jpg">
<meta property="og:url" content="https://bipulbarman.github.io/redirect-app-/">
<meta property="og:type" content="website">

<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="My Website">
<meta name="twitter:description" content="Welcome to my website.">
<meta name="twitter:image" content="ogimage.jpg">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}
body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f5f5f5;
}
.card{
background:#fff;
padding:30px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
text-align:center;
max-width:400px;
width:90%;
}
img{
width:100%;
border-radius:10px;
margin-bottom:20px;
}
h1{
margin-bottom:10px;
}
p{
color:#666;
}
</style>

</head>
<body>

<div class="card">

<img src="ogimage.jpg" alt="Preview">

<h1>My Website</h1>

<p>This page is configured with Open Graph tags.</p>

</div>

</body>
</html>
